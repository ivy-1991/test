services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tadp}
      POSTGRES_USER: ${POSTGRES_USER:-tadp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tadp}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tadp} -d ${POSTGRES_DB:-tadp}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    volumes: [redisdata:/data]
  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    volumes: [downloads:/downloads]
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["8080:80"]
volumes:
  pgdata: {}
  redisdata: {}
  downloads: {}
